services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - hours_data:/data
    environment:
      - DATA_FILE=/data/hours.json
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx reverse proxy - serves frontend and proxies /api to backend
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  hours_data:
