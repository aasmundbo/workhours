services:
  workhours-backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  workhours-frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - workhours-backend
    restart: unless-stopped

  # Nginx reverse proxy - serves frontend and proxies /api to backend
  workhours-nginx:
    image: nginx:alpine
    ports:
      - "925:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - workhours-backend
      - workhours-frontend
    restart: unless-stopped
